<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Historial Clínico General</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d1117;
      color: white;
    }
    .navbar-custom {
      background-color: #1f6feb;
    }
    .navbar-custom .nav-link,
    .navbar-custom .navbar-brand {
      color: white !important;
    }
    .container-box {
      background-color: #161b22;
      padding: 20px;
      border-radius: 10px;
      margin-top: 30px;
    }
    .form-control {
      background-color: #0d1117;
      border: 1px solid #30363d;
      color: white;
    }
    .form-control:focus {
      background-color: #0d1117;
      border-color: #1f6feb;
      color: white;
    }
    .form-label {
      color: #c9d1d9;
    }
  </style>
</head>

<nav class="navbar navbar-expand-lg navbar-custom">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Formatos Clínicos</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/leyfederal">Ley Federal de Protección de Datos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/contacto">Contacto</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
            Formatos clínicos
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/historial-general">Historial clínico general</a></li>
            <li><a class="dropdown-item" href="#">Especifico materia 1</a></li>
            <li><a class="dropdown-item" href="#">Especifico materia 2</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container container-box">
  <h2>Historial Clínico General</h2>
  <p class="text-muted">Complete los datos del paciente para generar el historial clínico.</p>
  
  <form id="historialForm" class="mt-4">
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">Nombre del Paciente</label>
        <input type="text" class="form-control" name="paciente" required>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">Fecha (automática)</label>
        <input type="text" class="form-control" id="fechaActual" readonly>
      </div>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Diagnóstico</label>
      <textarea class="form-control" name="diagnostico" rows="3" required></textarea>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Tratamiento</label>
      <textarea class="form-control" name="tratamiento" rows="3" required></textarea>
    </div>
    
    <div class="mb-3">
      <label class="form-label">Observaciones</label>
      <textarea class="form-control" name="observaciones" rows="3"></textarea>
    </div>
    
    <div class="mt-4">
      <button type="submit" class="btn btn-primary">Generar PDF</button>
      <a href="/" class="btn btn-secondary ms-2">Volver</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    const today = new Date();
    const fecha = today.toISOString().split('T')[0];
    document.getElementById("fechaActual").value = fecha;
});

document.getElementById("historialForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const formData = new FormData(e.target);
    const data = {
        paciente: formData.get("paciente"),
        diagnostico: formData.get("diagnostico"),
        tratamiento: formData.get("tratamiento"),
        observaciones: formData.get("observaciones"),
        fecha: document.getElementById("fechaActual").value
    };
    
    try {
        const res = await fetch("/generar-historial-general", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            const blob = await res.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "historial_clinico.pdf";
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        } else {
            alert("Error al generar el PDF");
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Error al generar el PDF");
    }
});
</script>

</body>
</html>
